name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:  # qo'lda ham ishga tushirish mumkin

jobs:
  # ─── 1. Build check ───────────────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  # ─── 2. Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            # NVM PATH yuklash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /home/user/pos-saas-backend

            echo "📥 Git pull..."
            git pull origin main

            echo "📦 Install dependencies (all)..."
            npm ci

            echo "🔧 Generate Prisma clients..."
            npm run prisma:generate

            echo "🗄  Run migrations..."
            npm run prisma:migrate

            echo "🔨 Build..."
            rm -rf dist tsconfig.tsbuildinfo
            npm run build

            echo "🔍 Build natijasini tekshirish..."
            ls -la dist/
            if [ ! -f dist/main.js ]; then
              echo "❌ dist/main.js yaratilmadi!"
              exit 1
            fi

            echo "🔁 Restart backend..."
            cd /home/user/pos-saas-backend
            pm2 delete warehouse-backend 2>/dev/null || true
            pm2 start dist/main.js --name warehouse-backend --cwd /home/user/pos-saas-backend
            pm2 save

            echo "✅ Deploy tugadi"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sleep 5
            curl -fsS http://localhost:3001/api/v1/health || (echo "❌ Health check FAIL" && exit 1)
            echo "✅ Backend sog'lom"

# Eslatma: Agar npm hali ham topilmasa, serverda NVM yoki Node.js'ning
# qayerda turganini bilish kerak: `which npm` qiling va PATH'ni shu yo'lga moslang
